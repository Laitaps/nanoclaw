name: Update parent submodule

on:
  push:
    branches: [main]

# Runs on the self-hosted radeon runner (same machine as prod) so this
# job can reach the prod Postgres at localhost. After bumping the
# submodule pointer and committing, we INSERT a Skippy promotion row
# for the new commit BEFORE pushing — otherwise the parent's deploy
# range-walk gate would reject the auto-bump as an unauthorized direct
# push (see scripts/verify_deploy_range.sh in the parent repo).
#
# pg_config.json + psql is the same path used by
# scripts/verify_deploy_authorization.sh, so this stays free of Python
# dependencies on the runner.

jobs:
  update-submodule:
    runs-on: [self-hosted, radeon]
    steps:
      - name: Checkout research-assistant
        uses: actions/checkout@v4
        with:
          repository: Laitaps/research-assistant
          token: ${{ secrets.PARENT_REPO_TOKEN }}
          submodules: true

      - name: Update nanoclaw submodule to latest main
        id: bump
        run: |
          cd nanoclaw
          git fetch origin main
          git checkout origin/main
          cd ..
          git add nanoclaw
          if git diff --cached --quiet; then
            echo "Submodule already up to date"
            echo "bumped=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update nanoclaw submodule to $(cd nanoclaw && git rev-parse --short HEAD)"
          echo "sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
          echo "bumped=true" >>"$GITHUB_OUTPUT"

      - name: Authorize auto-bump for parent deploy gate
        if: steps.bump.outputs.bumped == 'true'
        env:
          BUMP_SHA: ${{ steps.bump.outputs.sha }}
          NANOCLAW_SHA: ${{ github.sha }}
        run: |
          # Insert a Skippy promotion row keyed on the auto-bump SHA so
          # the parent deploy gate's range-walk authorizes this commit.
          # Reuses pr_number=0 — a reserved synthetic agent_pull_requests
          # row owning every auto-bump (see scripts/insert_auto_bump_promotion.py).
          # Validate SHAs before substituting into SQL — both come from
          # trusted CI sources (git rev-parse and github.sha), but
          # defense-in-depth.
          [[ "$BUMP_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "FAIL: bad BUMP_SHA $BUMP_SHA" >&2; exit 1; }
          [[ "$NANOCLAW_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "FAIL: bad NANOCLAW_SHA $NANOCLAW_SHA" >&2; exit 1; }

          # pg_config.json is local to the prod host (gitignored) — the
          # runner's CI checkout doesn't contain it. Read from the prod
          # checkout's well-known path; this only works because the
          # runner shares the host with prod.
          PG_CFG=/home/christian/projects/research_assistant/pg_config.json
          PG_PASSWORD=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['password'])" "$PG_CFG")
          PG_USER=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['user'])" "$PG_CFG")
          PG_DB=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['database'])" "$PG_CFG")

          PGPASSWORD="$PG_PASSWORD" psql -h localhost -U "$PG_USER" -d "$PG_DB" -v ON_ERROR_STOP=1 <<SQL
          -- Reserved synthetic PR row owning every auto-bump promotion.
          INSERT INTO agent_pull_requests
              (pr_number, repo, opener_agent_id, current_holder_agent_id,
               status, round, max_rounds, max_tokens, tokens_used)
          SELECT 0, 'Laitaps/research-assistant', a.id, a.id,
                 'merged', 1, 3, 500000, 0
            FROM agents a WHERE a.name = 'Skippy'
          ON CONFLICT (pr_number) DO UPDATE SET updated_at = NOW();

          INSERT INTO agent_pr_promotions
              (pr_id, from_agent_id, to_agent_id, status, comment, round,
               merge_commit_sha)
          SELECT apr.id, a.id, NULL, 'merged',
                 'Auto-bump from nanoclaw ${NANOCLAW_SHA}', 1, '${BUMP_SHA}'
            FROM agent_pull_requests apr
            JOIN agents a ON a.name = 'Skippy'
           WHERE apr.pr_number = 0;
          SQL

          echo "Authorized auto-bump $BUMP_SHA"

      - name: Push
        if: steps.bump.outputs.bumped == 'true'
        run: git push
